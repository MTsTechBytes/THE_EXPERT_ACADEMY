<!DOCTYPE html>
<html>
<head>
  <title>Courses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

  <h2>Our Courses</h2>

  <div class="row" id="courseList"></div>

</div>

<script>
fetch("../backend/api/get_courses.php")
.then(res => res.json())
.then(data => {

  let html = "";

  data.forEach(course => {
  html += `
    <div class="col-md-4 mt-3">
      <div class="card p-2 shadow">
        <img src="${course.image}" class="card-img-top">
        <h5>${course.title}</h5>
        <p>${course.description}</p>
        <b>Fee: ${course.fee}</b>

        <button class="btn btn-primary mt-2" onclick="enroll(${course.id})">
          Enroll Now
        </button>
      </div>
    </div>
  `;
});

  document.getElementById("courseList").innerHTML = html;

});

function enroll(course_id) {

  let user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  fetch("../backend/api/enroll_course.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      course_id: course_id
    })
  })

  .then(res => res.json())
  .then(data => {
    alert(data.message);
  });

}
</script>

<input type="text" id="search" placeholder="Search courses"> <script> document.getElementById("search").addEventListener("input", function() { fetch("../backend/api/search_courses.php?q=" + this.value) .then(res => res.json()) .then(data => { console.log(data); }); }); </script>

</body>
</html>
