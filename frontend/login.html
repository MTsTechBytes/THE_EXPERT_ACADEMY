<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - THE EXPERT ACADEMY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    .login-box h2 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      -webkit-text-fill-color: unset;
      background: unset;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-control {
      padding: 12px 15px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }
    .login-link {
      text-align: center;
      margin-top: 15px;
    }
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .alert {
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <h2>
      <i class="fas fa-sign-in-alt"></i> Welcome Back
    </h2>

    <div class="form-group">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>

    <div class="login-link">
      Don't have an account? <a href="register.html">Sign up now</a>
    </div>

    <div id="msg"></div>
  </div>
</div>

<script>
function login() {
  fetch("../backend/api/login.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.user) {
      localStorage.setItem("user", JSON.stringify(data.user));
      document.getElementById("msg").innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Login successful! Redirecting...</div>';
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      document.getElementById("msg").innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ' + data.message + '</div>';
    }
  });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

    },
    body: JSON.stringify({

      password: document.getElementById("password").value
    })
  })

  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;

    if (data.user) {

  localStorage.setItem("user", JSON.stringify(data.user));

  if (data.user.role === "admin") {
    window.location.href = "../admin/dashboard.html";
  } else {
    window.location.href = "../student/dashboard.html";
  }
}
  });

}
</script>

</body>
</html>
