<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2>Login</h2>

  <input type="email" id="email" class="form-control mt-2" placeholder="Email">
  <input type="password" id="password" class="form-control mt-2" placeholder="Password">

  <button class="btn btn-success mt-3" onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function login() {

  fetch("../backend/api/login.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })

  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;

    if (data.user) {

  localStorage.setItem("user", JSON.stringify(data.user));

  if (data.user.role === "admin") {
    window.location.href = "../admin/dashboard.html";
  } else {
    window.location.href = "../student/dashboard.html";
  }
}
  });

}
</script>

</body>
</html>
