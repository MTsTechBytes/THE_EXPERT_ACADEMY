<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2>Register</h2>

  <input type="text" id="name" class="form-control mt-2" placeholder="Name">
  <input type="email" id="email" class="form-control mt-2" placeholder="Email">
  <input type="password" id="password" class="form-control mt-2" placeholder="Password">

  <button class="btn btn-primary mt-3" onclick="register()">Register</button>

  <p id="msg"></p>
</div>

<script>
function register() {

  fetch("../backend/api/register.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })

  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;
  });

}
</script>

</body>
</html>
