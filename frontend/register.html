<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - THE EXPERT ACADEMY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .register-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px 0;
    }
    .register-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 450px;
    }
    .register-box h2 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      -webkit-text-fill-color: unset;
      background: unset;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-control {
      padding: 12px 15px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .register-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .register-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }
    .register-link {
      text-align: center;
      margin-top: 15px;
    }
    .register-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
    .alert {
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="register-container">
  <div class="register-box">
    <h2>
      <i class="fas fa-user-plus"></i> Create Account
    </h2>

    <div class="form-group">
      <label for="name" class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password">
    </div>

    <div class="form-group">
      <label for="confirm_password" class="form-label">Confirm Password</label>
      <input type="password" id="confirm_password" class="form-control" placeholder="Confirm your password">
    </div>

    <button class="register-btn" onclick="register()">
      <i class="fas fa-user-plus"></i> Create Account
    </button>

    <div class="register-link">
      Already have an account? <a href="login.html">Sign in here</a>
    </div>

    <div id="msg"></div>
  </div>
</div>

<script>
function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirm_password").value;

  if (!name || !email || !password || !confirmPassword) {
    document.getElementById("msg").innerHTML = '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle"></i> Please fill in all fields</div>';
    return;
  }

  if (password !== confirmPassword) {
    document.getElementById("msg").innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Passwords do not match</div>';
    return;
  }

  fetch("../backend/api/register.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById("msg").innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Account created! Redirecting to login...</div>';
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      document.getElementById("msg").innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ' + data.message + '</div>';
    }
  });
}

// Allow Enter key to submit
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    register();
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
