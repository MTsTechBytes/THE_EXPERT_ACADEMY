<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../frontend/assets/css/enterprise.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>TEA</h2>

  <a href="#">Dashboard</a>
  <a href="add_course.html">Courses</a>
  <a href="assignments.html">Assignments</a>
  <a href="enrollments.html">Enrollments</a>

  <a href="../frontend/login.html">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <div>
      <button class="btn btn-primary" onclick="toggleSidebar()">☰</button>
      <button class="btn btn-dark" onclick="toggleDark()">🌙</button>
    </div>

    <h3>Admin Dashboard</h3>

  </div>

  <!-- CARDS -->
  <div class="grid">

    <div class="card">
      <h3>Students</h3>
      <h1 id="students">0</h1>
    </div>

    <div class="card">
      <h3>Courses</h3>
      <h1 id="courses">0</h1>
    </div>

    <div class="card">
      <h3>Enrollments</h3>
      <h1 id="enrollments">0</h1>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script src="../frontend/assets/js/app.js"></script>

<script>
// LOAD STATS
fetch("../backend/api/dashboard_stats.php")
.then(res => res.json())
.then(data => {
  document.getElementById("students").innerText = data.students;
  document.getElementById("courses").innerText = data.courses;
  document.getElementById("enrollments").innerText = data.enrollments;

  showToast("Dashboard Loaded");
});

// DARK MODE
function toggleDark() {
  document.body.classList.toggle("dark");
}

// SIDEBAR TOGGLE
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
}
</script>

</body>
</html>
