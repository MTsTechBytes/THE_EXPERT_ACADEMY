<!DOCTYPE html>
<html>
<head>
  <title>Add Course</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

  <h2>Add Course</h2>

  <input id="title" class="form-control mt-2" placeholder="Title">
  <input id="description" class="form-control mt-2" placeholder="Description">
  <input id="duration" class="form-control mt-2" placeholder="Duration">
  <input id="fee" class="form-control mt-2" placeholder="Fee">
  <input id="image" class="form-control mt-2" placeholder="Image URL">

  <button class="btn btn-primary mt-3" onclick="addCourse()">Add Course</button>

  <p id="msg"></p>

</div>

<script>
function addCourse() {

  fetch("../backend/api/add_course.php", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      title: document.getElementById("title").value,
      description: document.getElementById("description").value,
      duration: document.getElementById("duration").value,
      fee: document.getElementById("fee").value,
      image: document.getElementById("image").value
    })
  })

  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;
  });

}
</script>

</body>
</html>
